---
vars_prompt:
  - name: 'username'
    prompt: 'Enter username for the new user'
    private: no

  - name: 'password'
    prompt: 'Enter password for the new user'
    private: yes
    encrypt: sha512_crypt
    confirm: yes

  - name: 'user_ssh_public_key'
    prompt: 'Enter SSH public key for the new user'
    private: no

- name: Create new user and add to the "sudo" group
  user:
    name: '{{username}}'
    password: '{{password}}'
    groups: sudo
    shell: /bin/bash

- name: Add SSH public key to the new user to allow SSH access
  authorized_key:
    user: '{{username}}'
    key: '{{user_ssh_public_key}}'
